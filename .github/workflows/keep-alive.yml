name: Keep Render ZKML Backend Alive

on:
  schedule:
    # Runs every 10 minutes to prevent the Render free tier container from sleeping
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  ping-render:
    runs-on: ubuntu-latest
    steps:
      - name: Ping ZKML Microservice
        run: |
          echo "Pinging https://kryon.onrender.com to keep the container warm..."
          # We use a 10s timeout. If it returns anything (even a 404 or 405), it successfully hit the container and kept it awake.
          curl -m 10 -I https://kryon.onrender.com || echo "Ping timeout or failed, but request was sent."
